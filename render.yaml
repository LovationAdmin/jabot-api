services:
  - type: redis
    name: jabot-redis
    region: frankfurt
    plan: free
    ipAllowList: []

  - type: web
    name: jabot-api
    env: python
    region: frankfurt
    plan: free
    # Le `python -c "import app.main"` est un smoke-test : si un import est cassé
    # (module manquant, erreur de syntaxe...), le build échoue ici AVANT le déploiement,
    # ce qui évite de mettre en prod une version qui ne démarre pas.
    buildCommand: pip install -r requirements.txt && python -c "import app.main"
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: jabot-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: jabot-redis
          type: redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_DAYS
        value: "7"
      - key: ENVIRONMENT
        value: production
      - key: AFRICAS_TALKING_API_KEY
        sync: false
      - key: AFRICAS_TALKING_USERNAME
        sync: false
      - key: AFRICAS_TALKING_SENDER_ID
        value: JABOT
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      # Chiffrement des champs sensibles — à définir AVANT la migration 005.
      # Générer la clé Fernet :
      #   python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
      - key: ENCRYPTION_KEYS
        sync: false
      - key: PHONE_HMAC_KEY
        generateValue: true
      # SMS : false en prod (envoi réel, pas de dev_code exposé)
      - key: SMS_DEV_MODE
        value: "false"

databases:
  - name: jabot-db
    databaseName: jabot_db
    plan: free
    region: frankfurt
    postgresMajorVersion: "16"
