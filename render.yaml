services:
  - type: redis
    name: jabot-redis
    region: frankfurt
    plan: free
    ipAllowList: []

  - type: web
    name: jabot-api
    env: python
    region: frankfurt
    plan: starter
    # Smoke-test : si un import est cassé, le build échoue avant le déploiement.
    buildCommand: pip install -r requirements.txt && python -c "import app.main"
    # preDeployCommand : exécuté UNE SEULE FOIS par déploiement (pas à chaque
    # réveil/redémarrage). Ici on y met les migrations Alembic — elles n'ont pas
    # besoin de tourner à chaque cold start, seulement quand le code change.
    # (Fonctionnalité disponible sur les plans payants Render.)
    preDeployCommand: alembic upgrade head
    # WEB_CONCURRENCY=2 : deux workers uvicorn pour traiter les requêtes en
    # parallèle. Protège GET /tree si un worker est occupé sur un upload lourd.
    # Les workers se synchronisent via Redis pub/sub (ws_manager).
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers $WEB_CONCURRENCY
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: jabot-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: jabot-redis
          type: redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_DAYS
        value: "7"
      - key: ENVIRONMENT
        value: production
      # 2 workers uvicorn — isolent les uploads lourds du reste du trafic.
      - key: WEB_CONCURRENCY
        value: "2"
      # SMS : Termii (fournisseur unique) — sender ID « Lovation » approuvé
      # pour la route internationale France + Sénégal. Clé à définir dans le
      # dashboard Render.
      - key: TERMII_API_KEY
        sync: false
      - key: TERMII_SENDER_ID
        value: Lovation
      # Invitations par SMS (lien + code), envoyées via la cascade Termii.
      # Elles consomment le même quota que l'OTP : 2 SMS / numéro / 24 h.
      - key: INVITATION_ENABLED
        value: "true"
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      # Chiffrement des champs sensibles — à définir AVANT la migration 005.
      # Générer la clé Fernet :
      #   python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
      - key: ENCRYPTION_KEYS
        sync: false
      - key: PHONE_HMAC_KEY
        generateValue: true
      # SMS : false en prod (envoi réel, pas de dev_code exposé)
      - key: SMS_DEV_MODE
        value: "false"

databases:
  - name: jabot-db
    databaseName: jabot_db
    plan: free
    region: frankfurt
    postgresMajorVersion: "16"
